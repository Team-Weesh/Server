name: CI/CD

on:
  push:
    branches:
      - prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: JDK 설치
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '24'

      - name: 빌드 (bootJar + 테스트 제외)
        run: ./gradlew bootJar -x test

      - name: 빌드 결과 확인
        run: ls -l build/libs/

  deploy:
    runs-on: ubuntu-latest
    needs: build  # build가 완료되어야 실행됨

    steps:
      - name: jar 존재 확인
        run: ls -l build/libs/weesh-*.jar

      - name: jar를 EC2로 복사
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/weesh-*.jar"
          target: "/home/ec2-user/app/"

      - name: EC2에서 deploy.sh 실행
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_JPA_HIBERNATE_DDL_AUTO: ${{ secrets.SPRING_JPA_HIBERNATE_DDL_AUTO }}
          SPRING_REDIS_HOST: ${{ secrets.SPRING_REDIS_HOST }}
          SPRING_REDIS_PORT: ${{ secrets.SPRING_REDIS_PORT }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app
            chmod +x deploy.sh
            export SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
            export SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME
            export SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
            export SPRING_JPA_HIBERNATE_DDL_AUTO=$SPRING_JPA_HIBERNATE_DDL_AUTO
            export SPRING_REDIS_HOST=$SPRING_REDIS_HOST
            export SPRING_REDIS_PORT=$SPRING_REDIS_PORT
            ./deploy.sh